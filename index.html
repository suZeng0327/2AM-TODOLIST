<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2AM Reset To-Do</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <aside class="ad-left">
            <ins class="kakao_ad_area" style="display:none;"
                data-ad-unit="DAN-WFfc3EQNjLZLKOBu"
                data-ad-width="160"
                data-ad-height="600"></ins>
            <script type="text/javascript" src="//t1.daumcdn.net/kas/static/ba.min.js" async></script>
        </aside>

        <div class="container">
            <header>
                <h1>새벽2시마다 리셋되는 todo-list</h1>
                <button id="history-btn" title="기록 보기"><i class="fas fa-history"></i></button>
            </header>

            <div class="input-section">
                <input type="text" id="todo-input" placeholder="할 일을 입력하고 엔터를 누르세요..." autocomplete="off">
            </div>

            <ul id="todo-list"></ul>
        </div>
    </div>

    <div id="history-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>지난 기록</h2>
            <button id="close-sidebar">&times;</button>
        </div>
        <div id="history-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
